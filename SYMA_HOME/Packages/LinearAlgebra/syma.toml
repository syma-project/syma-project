[package]
name = "LinearAlgebra"
version = "0.2.0"
description = "Linear algebra operations: matrix arithmetic, determinants, inverses, linear solvers, eigenvalues, and matrix construction utilities."
entry = "LinearAlgebra.syma"

[exports]
symbols = ["Dimensions", "Dot", "MatrixMultiply", "IdentityMatrix", "Det",
  "Inverse", "Transpose", "Tr", "Norm", "Cross", "LinearSolve",
  "MatrixPower", "Eigenvalues", "Eigenvectors", "ArrayFlatten",
  "ZeroMatrix", "DiagonalMatrix", "UnitVector",
  "RowReduce", "MatrixRank", "NullSpace", "Row", "Column",
  "KroneckerProduct", "VectorAngle", "PseudoInverse", "Minors"]
